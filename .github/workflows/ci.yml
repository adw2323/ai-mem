name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check client/src/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: pip install build
      - name: Build package
        run: python -m build client/
      - name: Verify dist artifacts
        run: |
          ls client/dist/
          test "$(ls client/dist/*.whl 2>/dev/null | wc -l)" -ge 1 || (echo "No wheel found" && exit 1)
          test "$(ls client/dist/*.tar.gz 2>/dev/null | wc -l)" -ge 1 || (echo "No sdist found" && exit 1)

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest tests/ -v --tb=short
